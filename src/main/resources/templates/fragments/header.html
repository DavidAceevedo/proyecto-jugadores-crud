<header th:fragment="header" class="border-bottom bg-light" xmlns:th="http://www.thymeleaf.org">
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
                <img th:src="@{/images/logo.svg}" alt="Logo" width="40" height="32" class="me-2">
                <span class="fw-semibold text-primary" th:text="#{msg.app.name}">Gestor Jugadores</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                    aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}" th:text="#{msg.menu.home}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/players}" th:text="#{msg.menu.players}">Jugadores</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center mt-3 mt-lg-0">
                    <form method="get" th:action="@{/}" class="me-3">
                        <select id="langSelect" name="lang" class="form-select form-select-sm" onchange="this.form.submit()">
                            <option value="es" th:selected="${#locale.language == 'es'}">Español</option>
                            <option value="en" th:selected="${#locale.language == 'en'}">English</option>
                        </select>
                    </form>

                </div>
            </div>
        </div>
    </nav>
</header>
