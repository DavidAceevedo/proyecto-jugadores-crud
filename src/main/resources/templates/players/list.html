<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{msg.player.list.title})}"></head>
<body>
<nav th:replace="~{fragments/header :: nav}"></nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="#{msg.player.list.title}">Lista de Jugadores</h2>
        <a th:href="@{/players/new}" class="btn btn-primary" th:text="#{msg.btn.add}">Añadir Jugador</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th th:text="#{msg.player.list.name}">Nombre</th>
            <th th:text="#{msg.player.list.number}">Dorsal</th>
            <th th:text="#{msg.player.list.team}">Equipo</th>
            <th th:text="#{msg.player.list.actions}">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${players}">
            <td th:text="${p.name}">Nombre</td>
            <td th:text="${p.number}">10</td>
            <td th:text="${p.teamName}">Equipo</td>
            <td>
                <a th:href="@{/players/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning" th:text="#{msg.btn.edit}">Editar</a>
                <a th:href="@{/players/delete/{id}(id=${p.id})}"
                   class="btn btn-sm btn-danger"
                   th:onclick="return confirm('¿Seguro?')"
                   th:text="#{msg.btn.delete}">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
